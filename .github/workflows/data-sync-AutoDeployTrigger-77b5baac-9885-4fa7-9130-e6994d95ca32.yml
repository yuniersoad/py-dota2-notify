name: Trigger auto deployment for data-sync

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ master ]
    paths:
    - '**'
    - '.github/workflows/data-sync-AutoDeployTrigger-77b5baac-9885-4fa7-9130-e6994d95ca32.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.DATASYNC_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.DATASYNC_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.DATASYNC_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: Dockerfile.sync
          registryUrl: dota2notify2.azurecr.io
          registryUsername: ${{ secrets.DATASYNC_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.DATASYNC_REGISTRY_PASSWORD }}
          containerAppName: data-sync
          resourceGroup: dota2notify
          imageToBuild: dota2notify2.azurecr.io/data-sync:${{ github.sha }}


